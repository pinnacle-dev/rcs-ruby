plugins:
  - rubocop-minitest

AllCops:
  TargetRubyVersion: 3.3
  NewCops: enable

Style/StringLiterals:
  EnforcedStyle: double_quotes

Style/StringLiteralsInInterpolation:
  EnforcedStyle: double_quotes

Style/AccessModifierDeclarations:
  Enabled: false

Lint/ConstantDefinitionInBlock:
  Enabled: false

Metrics/AbcSize:
  Enabled: false

Metrics/BlockLength:
  Enabled: false

Metrics/ClassLength:
  Enabled: false

Metrics/MethodLength:
  Enabled: false

Metrics/ParameterLists:
  Enabled: false

Metrics/PerceivedComplexity:
  Enabled: false

Metrics/CyclomaticComplexity:
  Enabled: false

Metrics/ModuleLength:
  Enabled: false

Layout/LineLength:
  Enabled: false

Naming/VariableNumber:
  EnforcedStyle: snake_case

Style/Documentation:
  Enabled: false

Style/Lambda:
  EnforcedStyle: literal

Minitest/MultipleAssertions:
  Enabled: false

Minitest/UselessAssertion:
  Enabled: false

# Auto-generated `internal/types/*.rb` ends with a bare `value` reference
# inside the type-coercion fallthrough — intentional, not dead code.
Lint/Void:
  Exclude:
    - "lib/pinnacle/internal/types/**/*.rb"

# Auto-generated test_union.rb uses `assert X.member?(Y)` because it's
# testing the `member?` API directly, not a generic collection check.
Minitest/AssertIncludes:
  Exclude:
    - "test/unit/internal/types/**/*.rb"

Minitest/RefuteIncludes:
  Exclude:
    - "test/unit/internal/types/**/*.rb"
