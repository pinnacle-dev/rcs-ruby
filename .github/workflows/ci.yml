name: ci

on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Run Rubocop
        run: bundle exec rubocop

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Run Tests
        run: bundle exec rake test

  publish:
    name: Publish to RubyGems.org
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.event_name == 'push' && contains(github.ref, 'refs/tags/')

    permissions:
      id-token: write
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Configure RubyGems Trusted Publisher
        uses: rubygems/configure-rubygems-credentials@v1.0.0

      - name: Build gem
        run: gem build pinnacle.gemspec

      - name: Publish gem
        # RubyGems uses version-string semantics for pre-releases — a
        # version like `2.0.16.pre.rc.1` is automatically hidden from
        # `gem install rcs` and only installs via `gem install rcs --pre`
        # or an explicit `--version 2.0.16.pre.rc.1`. No dist-tag flag is
        # needed here; `gem push` is identical for stable and pre-release
        # tags. We just log which variant we're publishing.
        run: |
          if [[ ${GITHUB_REF} == *rc* ]]; then
            echo "Publishing pre-release (RC) — RubyGems will hide from plain 'gem install rcs'"
          elif [[ ${GITHUB_REF} == *alpha* ]]; then
            echo "Publishing pre-release (alpha)"
          elif [[ ${GITHUB_REF} == *beta* ]]; then
            echo "Publishing pre-release (beta)"
          else
            echo "Publishing stable release"
          fi
          gem push *.gem